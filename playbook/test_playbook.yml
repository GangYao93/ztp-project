---
- name: dynamic_vyos
  hosts: all
  gather_facts: no
  tasks:
    # 1. config int desc
    - name: int_desc
      vyos.vyos.vyos_config:
        lines:
          - set interfaces ethernet {{ item.name }} description '{{ item.description }}'
        match: line
      loop: "{{ interfaces | default([]) }}"
      when: item.description is defined

    - name: int_addr
      vyos.vyos.vyos_config:
        lines:
          - set interfaces ethernet {{ item.name }} address '{{ item.address }}'
        match: line
      loop: "{{ interfaces | default([]) }}"
      when: item.address is defined
    # ==========================================
    # 3. 按需配置 OSPF (只针对带有 ospf 字段的接口)
    # ==========================================
    - name: 配置全局 OSPF 宣告
      vyos.vyos.vyos_config:
        lines:
          - set protocols ospf area {{ item.0.area }} network '{{ item.1 }}'
        match: line
      # subelements 会把 [{area: "0", networks: ["1.1.1.0/24", "2.2.2.0/24"]}]
      # 拆分成 (area:0, 1.1.1.0/24) 和 (area:0, 2.2.2.0/24) 两次循环
      loop: "{{ ospf_areas | default([]) | subelements('networks', skip_missing=True) }}"
      when: ospf_areas | default([]) | length > 0

    # ==========================================
    # 4. 按需配置 VRRP (只针对带有 vrrp 字段的接口)
    # ==========================================
    - name: vrrp
      vyos.vyos.vyos_config:
        lines:
          - set interfaces ethernet {{ item.name }} vrrp vrrp-group {{ item.vrrp.group }} virtual-address '{{ item.vrrp.virtual_address }}'
          - set interfaces ethernet {{ item.name }} vrrp vrrp-group {{ item.vrrp.group }} priority {{ item.vrrp.priority }}
        match: line
      loop: "{{ interfaces | default([]) }}"
      # 核心逻辑：只有该接口的 JSON 里包含 vrrp 字段，才执行此命令
      when: item.vrrp is defined

    # ==========================================
    # 5. 按需配置 DHCP 服务器 (全局配置)
    # ==========================================
    - name: 配置 DHCP Server
      vyos.vyos.vyos_config:
        lines:
          - set service dhcp-server shared-network-name {{ item.pool_name }} subnet {{ item.subnet }} default-router '{{ item.gateway }}'
          - set service dhcp-server shared-network-name {{ item.pool_name }} subnet {{ item.subnet }} start {{ item.start_ip }} stop {{ item.end_ip }}
          - set service dhcp-server shared-network-name {{ item.pool_name }} subnet {{ item.subnet }} name-server '{{ item.dns_servers[0] }}'
        match: line
      loop: "{{ dhcp_servers | default([]) }}"
      # 核心逻辑：只有 dhcp_servers 列表有数据时才执行
      when: dhcp_servers | default([]) | length > 0

    - name: commit
      vyos.vyos.vyos_config:
        commit: yes

    - name: save config
      vyos.vyos.vyos_config:
        save: yes